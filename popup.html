<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --bg-color: #ffffff; --hover-bg: #f5f5f5; --text-main: #222222; --text-sub: #888888; --border-color: #eeeeee; }
        body { width: 280px; margin: 0; padding: 8px 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); user-select: none; }
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; cursor: pointer; transition: background 0.15s ease; }
        .menu-item:hover { background-color: var(--hover-bg); }
        .menu-item.disabled { opacity: 0.4; pointer-events: none; } /* 보류 중인 기능은 클릭 안 되게 처리 */
        .menu-left { display: flex; align-items: center; gap: 14px; }
        .menu-icon { display: flex; align-items: center; justify-content: center; color: #555555; }
        .menu-icon svg { width: 18px; height: 18px; stroke-width: 1.5; }
        .menu-text { font-size: 14px; font-weight: 500; letter-spacing: -0.3px; }
        .shortcut { background-color: #f0f0f0; color: var(--text-sub); padding: 3px 6px; border-radius: 4px; font-size: 11px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-weight: 600; letter-spacing: 0.5px; }
        .divider { height: 1px; background-color: var(--border-color); margin: 6px 0; }
    </style>
</head>
<body>

    <div class="menu-item" id="btn-save-bookmark">
        <div class="menu-left">
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <span class="menu-text" id="text-save-bookmark">현재 페이지 북마크</span>
        </div>
        <span class="shortcut">⇧ B</span>
    </div>

    <div class="menu-item" id="btn-save-link">
        <div class="menu-left">
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            </div>
            <span class="menu-text" id="text-save-link">링크 아카이브 저장</span>
        </div>
        <span class="shortcut">⌥ 0</span>
    </div>

    <div class="divider"></div>

    <div class="menu-item" id="btn-batch-save">
        <div class="menu-left">
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </div>
            <span class="menu-text">일괄저장 스캐너</span>
        </div>
        <span class="shortcut">⌥ 1</span>
    </div>

    <div class="divider"></div>

    <div class="menu-item" id="btn-capture-area">
        <div class="menu-left">
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v14a2 2 0 0 0 2 2h14"></path><path d="M18 22V8a2 2 0 0 0-2-2H2"></path></svg>
            </div>
            <span class="menu-text">선택 범위 캡처</span>
        </div>
        <span class="shortcut">⌥ 2</span>
    </div>

    <div class="menu-item" id="btn-capture-visible">
        <div class="menu-left">
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line></svg>
            </div>
            <span class="menu-text" id="text-capture-visible">보이는 범위 캡처</span>
        </div>
        <span class="shortcut">⌥ 3</span>
    </div>

    <div class="menu-item disabled" id="btn-capture-full">
        <div class="menu-left">
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </div>
            <span class="menu-text">전체 화면 캡처 (준비중)</span>
        </div>
        <span class="shortcut">⌥ 4</span>
    </div>

    <script src="popup.js"></script>
</body>
</html>
